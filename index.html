<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip · Ulsidul Corporation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:    #100d23;
      --surface: #1e1d45;
      --border:  #372963;
      --muted:   #6766b3;
      --bright:  #eeffff;
      --accent:  #00FF9C;
      --blue:    #3D5AFE;
      --red:     #FF2200;
      --orange:  #FF8C00;
      --mainnet: #B02020;
    }

    body {
      min-height: 100vh;
      background: #0a0818;
      color: var(--bright);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Header */
    header {
      text-align: center;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      font-family: 'Orbitron', sans-serif;
    }

    /* Coin scene */
    .coin-scene {
      width: clamp(160px, 40vw, 200px);
      height: clamp(160px, 40vw, 200px);
      perspective: 600px;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s;
      cursor: pointer;
    }

    .coin.flipping {
      animation: coinSpin var(--spin-duration, 1.4s) cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
    }

    @keyframes coinSpin {
      0%   { transform: rotateY(0deg) rotateX(0deg); }
      20%  { transform: rotateY(360deg) rotateX(15deg); }
      40%  { transform: rotateY(720deg) rotateX(-10deg); }
      60%  { transform: rotateY(1080deg) rotateX(8deg); }
      80%  { transform: rotateY(1440deg) rotateX(-5deg); }
      100% { transform: rotateY(var(--final-rotation)) rotateX(0deg); }
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 3px solid var(--accent);
      box-shadow:
        0 0 20px rgba(0,255,156,0.35),
        0 0 60px rgba(0,255,156,0.12),
        inset 0 0 30px rgba(0,255,156,0.06);
      background: radial-gradient(circle at 35% 35%, #1e1d45, #100d23 60%, #0a0818);
    }

    .coin-face.tails {
      transform: rotateY(180deg);
      border-color: var(--blue);
      box-shadow:
        0 0 20px rgba(61,90,254,0.35),
        0 0 60px rgba(61,90,254,0.12),
        inset 0 0 30px rgba(61,90,254,0.06);
      background: radial-gradient(circle at 35% 35%, #1e1d45, #100d23 60%, #0a0818);
    }

    .face-label {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.55rem, 1.8vw, 0.65rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .coin-face.heads .face-label { color: var(--accent); }
    .coin-face.tails .face-label { color: var(--blue); }

    .face-symbol {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      line-height: 1;
    }

    .coin-face.heads .face-symbol {
      color: var(--accent);
      text-shadow: 0 0 16px rgba(0,255,156,0.8);
    }

    .coin-face.tails .face-symbol {
      color: var(--blue);
      text-shadow: 0 0 16px rgba(61,90,254,0.8);
    }

    /* Result display */
    .result-panel {
      width: 100%;
      background: var(--void);
      border: 1px solid rgba(0,255,156,0.2);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      transition: border-color 0.3s;
    }

    .result-panel.heads-result { border-color: rgba(0,255,156,0.5); }
    .result-panel.tails-result { border-color: rgba(61,90,254,0.5); }

    .result-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      transition: color 0.3s;
    }

    .result-value.heads { color: var(--accent); text-shadow: 0 0 12px rgba(0,255,156,0.7); }
    .result-value.tails { color: var(--blue);  text-shadow: 0 0 12px rgba(61,90,254,0.7); }
    .result-value.idle  { color: var(--muted); }

    /* Stats */
    .stats {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: var(--void);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .stat-card.heads-stat .stat-value { color: var(--accent); }
    .stat-card.tails-stat .stat-value { color: var(--blue); }
    .stat-card.total-stat .stat-value  { color: var(--bright); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }

    button {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.7rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.85rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid;
    }

    .btn-flip {
      background: transparent;
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0,255,156,0.15);
    }

    .btn-flip:hover:not(:disabled) {
      background: rgba(0,255,156,0.08);
      box-shadow: 0 0 20px rgba(0,255,156,0.3);
    }

    .btn-flip:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .btn-reset:hover {
      color: var(--bright);
      border-color: var(--muted);
    }

    /* History */
    .history-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      min-height: 28px;
      width: 100%;
    }

    .history-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .history-dot.h { background: var(--accent); box-shadow: 0 0 6px rgba(0,255,156,0.7); }
    .history-dot.t { background: var(--blue);   box-shadow: 0 0 6px rgba(61,90,254,0.7); }

    /* Footer */
    footer {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 360px) {
      .stats { flex-direction: column; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="logo">Ulsidul Corporation · Protocol</p>
      <h1>Coin Flip</h1>
      <p class="subtitle">Quantum Randomizer</p>
    </header>

    <div class="coin-scene" role="img" aria-label="Coin">
      <div class="coin" id="coin">
        <div class="coin-face heads">
          <span class="face-label">Heads</span>
          <span class="face-symbol">Ψ</span>
        </div>
        <div class="coin-face tails">
          <span class="face-label">Tails</span>
          <span class="face-symbol">Ω</span>
        </div>
      </div>
    </div>

    <div class="result-panel" id="resultPanel">
      <span class="result-label">Awaiting flip</span>
      <span class="result-value idle" id="resultValue">—</span>
    </div>

    <div class="stats">
      <div class="stat-card heads-stat">
        <div class="stat-label">Heads</div>
        <div class="stat-value" id="headsCount">0</div>
      </div>
      <div class="stat-card total-stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card tails-stat">
        <div class="stat-label">Tails</div>
        <div class="stat-value" id="tailsCount">0</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-flip" id="flipBtn" onclick="flip()">Flip Coin</button>
      <button class="btn-reset" onclick="reset()">Reset</button>
    </div>

    <div class="history-row" id="history" aria-label="Flip history"></div>

    <footer>
      <a href="https://persephora.net" target="_blank" rel="noopener">persephora.net</a>
      &nbsp;·&nbsp; Verde, Verde, Verde..
    </footer>
  </div>

  <script>
    let heads = 0, tails = 0, flipping = false;
    const coin      = document.getElementById('coin');
    const btn       = document.getElementById('flipBtn');
    const result    = document.getElementById('resultValue');
    const panel     = document.getElementById('resultPanel');
    const history   = document.getElementById('history');
    const headsEl   = document.getElementById('headsCount');
    const tailsEl   = document.getElementById('tailsCount');
    const totalEl   = document.getElementById('totalCount');

    function flip() {
      if (flipping) return;
      flipping = true;
      btn.disabled = true;

      const isHeads = Math.random() < 0.5;
      const extraSpins = (Math.floor(Math.random() * 3) + 3) * 360;
      const finalAngle = isHeads ? extraSpins : extraSpins + 180;

      coin.style.setProperty('--final-rotation', finalAngle + 'deg');
      coin.style.setProperty('--spin-duration', '1.4s');
      coin.classList.remove('flipping');
      void coin.offsetWidth;
      coin.classList.add('flipping');

      setTimeout(() => {
        coin.classList.remove('flipping');
        coin.style.transform = `rotateY(${finalAngle}deg)`;

        if (isHeads) {
          heads++;
          result.textContent = 'HEADS';
          result.className = 'result-value heads';
          panel.className = 'result-panel heads-result';
        } else {
          tails++;
          result.textContent = 'TAILS';
          result.className = 'result-value tails';
          panel.className = 'result-panel tails-result';
        }

        headsEl.textContent = heads;
        tailsEl.textContent = tails;
        totalEl.textContent = heads + tails;

        const dot = document.createElement('div');
        dot.className = 'history-dot ' + (isHeads ? 'h' : 't');
        dot.title = isHeads ? 'Heads' : 'Tails';
        history.appendChild(dot);

        flipping = false;
        btn.disabled = false;
      }, 1450);
    }

    function reset() {
      heads = 0; tails = 0;
      headsEl.textContent = '0';
      tailsEl.textContent = '0';
      totalEl.textContent = '0';
      result.textContent = '—';
      result.className = 'result-value idle';
      panel.className = 'result-panel';
      coin.style.transform = '';
      history.innerHTML = '';
    }
  </script>
</body>
</html>
