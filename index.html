<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip · Ulsidul Corporation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:    #100d23;
      --surface: #1e1d45;
      --border:  #372963;
      --muted:   #6766b3;
      --bright:  #eeffff;
      --accent:  #00FF9C;
      --blue:    #3D5AFE;
      --red:     #FF2200;
      --orange:  #FF8C00;
      --mainnet: #B02020;
    }

    body {
      min-height: 100vh;
      background: #0a0818;
      color: var(--bright);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Header */
    header {
      text-align: center;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      font-family: 'Orbitron', sans-serif;
    }

    /* Coin scene */
    .coin-scene {
      width: clamp(210px, 52vw, 260px);
      height: clamp(210px, 52vw, 260px);
      perspective: 800px;
      filter: drop-shadow(0 12px 40px rgba(0,0,0,0.85));
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .coin.flipping {
      animation: coinSpin var(--spin-duration, 1.5s) cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
    }

    @keyframes coinSpin {
      0%   { transform: rotateY(0deg) rotateX(0deg); }
      20%  { transform: rotateY(360deg) rotateX(18deg); }
      40%  { transform: rotateY(720deg) rotateX(-12deg); }
      60%  { transform: rotateY(1080deg) rotateX(9deg); }
      80%  { transform: rotateY(1440deg) rotateX(-4deg); }
      100% { transform: rotateY(var(--final-rotation)) rotateX(0deg); }
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .coin-face.tails { transform: rotateY(180deg); }

    /* SVG fills 100% of the face */
    .coin-face svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Result display */
    .result-panel {
      width: 100%;
      background: var(--void);
      border: 1px solid rgba(0,255,156,0.2);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      transition: border-color 0.3s;
    }

    .result-panel.heads-result { border-color: rgba(0,255,156,0.5); }
    .result-panel.tails-result { border-color: rgba(61,90,254,0.5); }

    .result-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .result-value {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      transition: color 0.3s;
    }

    .result-value.heads { color: var(--accent); text-shadow: 0 0 12px rgba(0,255,156,0.7); }
    .result-value.tails { color: var(--blue);  text-shadow: 0 0 12px rgba(61,90,254,0.7); }
    .result-value.idle  { color: var(--muted); }

    /* Stats */
    .stats {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: var(--void);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .stat-card.heads-stat .stat-value { color: var(--accent); }
    .stat-card.tails-stat .stat-value { color: var(--blue); }
    .stat-card.total-stat .stat-value  { color: var(--bright); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }

    button {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.7rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.85rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid;
    }

    .btn-flip {
      background: transparent;
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0,255,156,0.15);
    }

    .btn-flip:hover:not(:disabled) {
      background: rgba(0,255,156,0.08);
      box-shadow: 0 0 20px rgba(0,255,156,0.3);
    }

    .btn-flip:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .btn-reset:hover {
      color: var(--bright);
      border-color: var(--muted);
    }

    /* History */
    .history-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      min-height: 28px;
      width: 100%;
    }

    .history-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .history-dot.h { background: var(--accent); box-shadow: 0 0 6px rgba(0,255,156,0.7); }
    .history-dot.t { background: var(--blue);   box-shadow: 0 0 6px rgba(61,90,254,0.7); }

    /* Footer */
    footer {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 360px) {
      .stats { flex-direction: column; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="logo">Ulsidul Corporation · Protocol</p>
      <h1>Coin Flip</h1>
      <p class="subtitle">Quantum Randomizer</p>
    </header>

    <div class="coin-scene" role="img" aria-label="Coin">
      <div class="coin" id="coin">
        <!-- HEADS — Obverse (Sacagawea-style layout) -->
        <div class="coin-face heads">
          <svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <!-- Gold metallic base gradient -->
              <radialGradient id="goldH" cx="35%" cy="30%" r="70%">
                <stop offset="0%"   stop-color="#2a2050"/>
                <stop offset="35%"  stop-color="#1a1640"/>
                <stop offset="70%"  stop-color="#100d23"/>
                <stop offset="100%" stop-color="#050310"/>
              </radialGradient>
              <!-- Neon green metallic tint -->
              <radialGradient id="neonH" cx="50%" cy="50%" r="50%">
                <stop offset="60%"  stop-color="transparent"/>
                <stop offset="100%" stop-color="rgba(0,255,156,0.07)"/>
              </radialGradient>
              <!-- Top light sweep -->
              <radialGradient id="lightH" cx="32%" cy="25%" r="45%">
                <stop offset="0%"   stop-color="rgba(180,255,220,0.13)"/>
                <stop offset="100%" stop-color="transparent"/>
              </radialGradient>
              <!-- Arc text paths -->
              <path id="arcTop"    d="M 36,130 A 94,94 0 0,1 224,130"/>
              <path id="arcBottom" d="M 52,155 A 82,82 0 0,0 208,155"/>
              <path id="arcMotto"  d="M 68,170 A 68,68 0 0,0 192,170"/>
            </defs>

            <!-- Reeded edge (conic stripes) -->
            <circle cx="130" cy="130" r="129" fill="url(#goldH)"/>
            <circle cx="130" cy="130" r="129"
              fill="none" stroke-width="10"
              stroke="url(#neonH)"
              stroke-dasharray="3.2 3.2"
              opacity="0.5"/>

            <!-- Coin body -->
            <circle cx="130" cy="130" r="120" fill="url(#goldH)"/>
            <circle cx="130" cy="130" r="120" fill="url(#lightH)"/>

            <!-- Outer engraving ring -->
            <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(0,255,156,0.28)" stroke-width="1.2"/>
            <!-- Inner field ring -->
            <circle cx="130" cy="130" r="100" fill="none" stroke="rgba(0,255,156,0.16)" stroke-width="0.8"/>

            <!-- Metallic rim highlight -->
            <circle cx="130" cy="130" r="128" fill="none"
              stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

            <!-- "ULSIDUL CORPORATION" arc top -->
            <text font-family="Orbitron,sans-serif" font-size="9.5" font-weight="700"
                  fill="rgba(0,255,156,0.85)" letter-spacing="3.2">
              <textPath href="#arcTop" startOffset="50%" text-anchor="middle">
                ULSIDUL CORPORATION
              </textPath>
            </text>

            <!-- Stars left & right of portrait — like dollar coin -->
            <text x="46"  y="122" font-size="9" fill="rgba(0,255,156,0.55)" text-anchor="middle">★</text>
            <text x="214" y="122" font-size="9" fill="rgba(0,255,156,0.55)" text-anchor="middle">★</text>

            <!-- LIBERTY inscription (dollar coin staple) -->
            <text x="130" y="56" font-family="Orbitron,sans-serif" font-size="8"
                  font-weight="700" fill="rgba(0,255,156,0.60)"
                  text-anchor="middle" letter-spacing="3">LIBERTY</text>

            <!-- Portrait bust — stylized silhouette -->
            <!-- Head -->
            <ellipse cx="130" cy="104" rx="22" ry="26"
              fill="none" stroke="rgba(0,255,156,0.45)" stroke-width="1.2"/>
            <!-- Neck -->
            <rect x="123" y="128" width="14" height="10" rx="3"
              fill="none" stroke="rgba(0,255,156,0.35)" stroke-width="1"/>
            <!-- Shoulders -->
            <path d="M 100,145 Q 115,135 130,138 Q 145,135 160,145"
              fill="none" stroke="rgba(0,255,156,0.35)" stroke-width="1.2"/>
            <!-- Ψ glyph centered in portrait area -->
            <text x="130" y="116" font-family="Orbitron,sans-serif" font-size="22"
                  font-weight="900" fill="rgba(0,255,156,0.90)"
                  text-anchor="middle" dominant-baseline="middle"
                  filter="url(#glowH)">Ψ</text>

            <!-- "IN CODE WE TRUST" arc bottom -->
            <text font-family="Orbitron,sans-serif" font-size="7.5" font-weight="600"
                  fill="rgba(0,255,156,0.50)" letter-spacing="2.5">
              <textPath href="#arcMotto" startOffset="50%" text-anchor="middle">
                IN CODE WE TRUST
              </textPath>
            </text>

            <!-- Year bottom -->
            <text x="130" y="210" font-family="Orbitron,sans-serif" font-size="8.5"
                  font-weight="700" fill="rgba(0,255,156,0.55)"
                  text-anchor="middle" letter-spacing="2">MMXXVI</text>

            <!-- Bottom stars -->
            <text x="104" y="212" font-size="7" fill="rgba(0,255,156,0.40)" text-anchor="middle">★</text>
            <text x="156" y="212" font-size="7" fill="rgba(0,255,156,0.40)" text-anchor="middle">★</text>

            <!-- Neon glow overlay -->
            <defs>
              <filter id="glowH" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
          </svg>
        </div>

        <!-- TAILS — Reverse (Eagle-style layout) -->
        <div class="coin-face tails">
          <svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <radialGradient id="goldT" cx="35%" cy="30%" r="70%">
                <stop offset="0%"   stop-color="#1e2255"/>
                <stop offset="35%"  stop-color="#141845"/>
                <stop offset="70%"  stop-color="#100d23"/>
                <stop offset="100%" stop-color="#050310"/>
              </radialGradient>
              <radialGradient id="lightT" cx="32%" cy="25%" r="45%">
                <stop offset="0%"   stop-color="rgba(120,150,255,0.12)"/>
                <stop offset="100%" stop-color="transparent"/>
              </radialGradient>
              <path id="arcTopT"    d="M 36,130 A 94,94 0 0,1 224,130"/>
              <path id="arcBottomT" d="M 55,158 A 79,79 0 0,0 205,158"/>
              <path id="arcMottoT"  d="M 70,172 A 66,66 0 0,0 190,172"/>
              <filter id="glowT" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Reeded edge -->
            <circle cx="130" cy="130" r="129" fill="url(#goldT)"/>
            <circle cx="130" cy="130" r="129"
              fill="none" stroke-width="10"
              stroke="rgba(61,90,254,0.15)"
              stroke-dasharray="3.2 3.2"
              opacity="0.6"/>

            <!-- Coin body -->
            <circle cx="130" cy="130" r="120" fill="url(#goldT)"/>
            <circle cx="130" cy="130" r="120" fill="url(#lightT)"/>

            <!-- Engraving rings -->
            <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(61,90,254,0.28)" stroke-width="1.2"/>
            <circle cx="130" cy="130" r="100" fill="none" stroke="rgba(61,90,254,0.16)" stroke-width="0.8"/>
            <circle cx="130" cy="130" r="128" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

            <!-- "PERSEPHORA · MAINNET" arc top -->
            <text font-family="Orbitron,sans-serif" font-size="9.5" font-weight="700"
                  fill="rgba(61,90,254,0.90)" letter-spacing="3">
              <textPath href="#arcTopT" startOffset="50%" text-anchor="middle">
                PERSEPHORA · MAINNET
              </textPath>
            </text>

            <!-- Stars -->
            <text x="46"  y="122" font-size="9" fill="rgba(61,90,254,0.55)" text-anchor="middle">★</text>
            <text x="214" y="122" font-size="9" fill="rgba(61,90,254,0.55)" text-anchor="middle">★</text>

            <!-- Eagle body — stylized wings -->
            <path d="M 130,85 L 90,115 L 80,108 L 130,78 L 180,108 L 170,115 Z"
              fill="rgba(61,90,254,0.35)" stroke="rgba(61,90,254,0.60)" stroke-width="1"/>
            <!-- Wings spread -->
            <path d="M 90,115 Q 65,125 55,118 Q 70,130 88,128"
              fill="none" stroke="rgba(61,90,254,0.50)" stroke-width="1.2"/>
            <path d="M 170,115 Q 195,125 205,118 Q 190,130 172,128"
              fill="none" stroke="rgba(61,90,254,0.50)" stroke-width="1.2"/>
            <!-- Eagle body -->
            <ellipse cx="130" cy="128" rx="16" ry="20"
              fill="none" stroke="rgba(61,90,254,0.45)" stroke-width="1"/>
            <!-- Ω glyph -->
            <text x="130" y="135" font-family="Orbitron,sans-serif" font-size="22"
                  font-weight="900" fill="rgba(61,90,254,0.95)"
                  text-anchor="middle" dominant-baseline="middle"
                  filter="url(#glowT)">Ω</text>
            <!-- Olive branch left / arrows right (dollar coin symbols) -->
            <path d="M 86,148 Q 95,142 104,148 Q 95,154 86,148Z"
              fill="rgba(61,90,254,0.30)" stroke="rgba(61,90,254,0.45)" stroke-width="0.8"/>
            <path d="M 156,148 Q 165,142 174,148 Q 165,154 156,148Z"
              fill="rgba(61,90,254,0.30)" stroke="rgba(61,90,254,0.45)" stroke-width="0.8"/>
            <!-- Shield center bottom -->
            <path d="M 122,150 L 138,150 L 136,162 L 130,165 L 124,162 Z"
              fill="none" stroke="rgba(61,90,254,0.35)" stroke-width="0.8"/>

            <!-- "E PLURIBUS UNUM" motto arc -->
            <text font-family="Orbitron,sans-serif" font-size="7.5" font-weight="600"
                  fill="rgba(61,90,254,0.52)" letter-spacing="2.2">
              <textPath href="#arcMottoT" startOffset="50%" text-anchor="middle">
                E PLURIBUS UNUM
              </textPath>
            </text>

            <!-- Year + stars bottom -->
            <text x="104" y="212" font-size="7" fill="rgba(61,90,254,0.40)" text-anchor="middle">★</text>
            <text x="130" y="212" font-family="Orbitron,sans-serif" font-size="8.5"
                  font-weight="700" fill="rgba(61,90,254,0.55)"
                  text-anchor="middle" letter-spacing="2">MMXXVI</text>
            <text x="156" y="212" font-size="7" fill="rgba(61,90,254,0.40)" text-anchor="middle">★</text>
          </svg>
        </div>
      </div>
    </div>

    <div class="result-panel" id="resultPanel">
      <span class="result-label">Awaiting flip</span>
      <span class="result-value idle" id="resultValue">—</span>
    </div>

    <div class="stats">
      <div class="stat-card heads-stat">
        <div class="stat-label">Heads</div>
        <div class="stat-value" id="headsCount">0</div>
      </div>
      <div class="stat-card total-stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card tails-stat">
        <div class="stat-label">Tails</div>
        <div class="stat-value" id="tailsCount">0</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-flip" id="flipBtn" onclick="flip()">Flip Coin</button>
      <button class="btn-reset" onclick="reset()">Reset</button>
    </div>

    <div class="history-row" id="history" aria-label="Flip history"></div>

    <footer>
      <a href="https://persephora.net" target="_blank" rel="noopener">persephora.net</a>
      &nbsp;·&nbsp; Verde, Verde, Verde..
    </footer>
  </div>

  <script>
    let heads = 0, tails = 0, flipping = false;
    const coin      = document.getElementById('coin');
    const btn       = document.getElementById('flipBtn');
    const result    = document.getElementById('resultValue');
    const panel     = document.getElementById('resultPanel');
    const history   = document.getElementById('history');
    const headsEl   = document.getElementById('headsCount');
    const tailsEl   = document.getElementById('tailsCount');
    const totalEl   = document.getElementById('totalCount');

    function flip() {
      if (flipping) return;
      flipping = true;
      btn.disabled = true;

      const isHeads = Math.random() < 0.5;
      const extraSpins = (Math.floor(Math.random() * 3) + 3) * 360;
      const finalAngle = isHeads ? extraSpins : extraSpins + 180;

      coin.style.setProperty('--final-rotation', finalAngle + 'deg');
      coin.style.setProperty('--spin-duration', '1.4s');
      coin.classList.remove('flipping');
      void coin.offsetWidth;
      coin.classList.add('flipping');

      setTimeout(() => {
        coin.classList.remove('flipping');
        coin.style.transform = `rotateY(${finalAngle}deg)`;

        if (isHeads) {
          heads++;
          result.textContent = 'HEADS';
          result.className = 'result-value heads';
          panel.className = 'result-panel heads-result';
        } else {
          tails++;
          result.textContent = 'TAILS';
          result.className = 'result-value tails';
          panel.className = 'result-panel tails-result';
        }

        headsEl.textContent = heads;
        tailsEl.textContent = tails;
        totalEl.textContent = heads + tails;

        const dot = document.createElement('div');
        dot.className = 'history-dot ' + (isHeads ? 'h' : 't');
        dot.title = isHeads ? 'Heads' : 'Tails';
        history.appendChild(dot);

        flipping = false;
        btn.disabled = false;
      }, 1450);
    }

    function reset() {
      heads = 0; tails = 0;
      headsEl.textContent = '0';
      tailsEl.textContent = '0';
      totalEl.textContent = '0';
      result.textContent = '—';
      result.className = 'result-value idle';
      panel.className = 'result-panel';
      coin.style.transform = '';
      history.innerHTML = '';
    }
  </script>
</body>
</html>
